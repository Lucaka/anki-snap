name: Build and Upload Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -r ../anki-snap-${{ github.ref_name }}.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: anki-snap-${{ github.ref_name }}.zip
